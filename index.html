<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Res-Rate 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:18px}
#app{width:min(430px,100%);display:flex;flex-direction:column;gap:16px}
#credit{text-align:center;color:#7b7b7b;font-size:13px;font-weight:500;letter-spacing:.5px;user-select:none}
.card{background:#111;border:4px solid #30D158;border-radius:24px;transition:border-color .25s ease}
#rrCard{padding:26px;text-align:center}
#rrValue{font-size:88px;font-weight:700;line-height:.95;font-variant-numeric:tabular-nums}
#rrUnit{margin-top:10px;color:#aaa;font-size:28px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.small{background:#111;border-radius:20px;padding:18px}
.label{text-align:center;color:#888;font-size:14px;margin-bottom:10px}
.stopWrap{display:grid;grid-template-columns:1fr auto;align-items:center}
.stopDigits{width:9ch;text-align:center;justify-self:center;font-size:30px;font-weight:600;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.stopUnit{font-size:12px;color:#777;justify-self:end}
.count{text-align:center;font-size:30px;font-weight:600;font-variant-numeric:tabular-nums}
button{border:none;border-radius:22px;font-weight:700;cursor:pointer}
#tap{padding:22px;background:#0A84FF;color:#fff;font-size:23px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row button{padding:18px;background:#222;color:#fff;font-size:20px}
#flash{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity .12s}
</style>
</head>
<body>
<div id="flash"></div>
<div id="app">
<div id="credit">Ritti.co | Res-Rate 2026</div>

<div id="rrCard" class="card">
<div id="rrValue">--</div>
<div id="rrUnit">BPM</div>
</div>

<div class="stats">
<div class="small">
<div class="label">Stopwatch</div>
<div class="stopWrap">
<div id="time" class="stopDigits">00:00.00</div>
<div class="stopUnit">elapsed</div>
</div>
</div>

<div class="small">
<div class="label">Inhales</div>
<div id="inhales" class="count">0</div>
</div>
</div>

<button id="tap">TAP TO RECORD INHALE</button>

<div class="row">
<button id="pause">Pause</button>
<button id="clear">Clear</button>
</div>
</div>

<script>
const timeEl=time, rrEl=rrValue, card=rrCard, inhalesEl=inhales;
let started=false,running=false,paused=false;
let start=0,pauseAt=0,pausedMs=0,elapsed=0;
let inhaleTimes=[];
let lastTap=0;
const flash=document.getElementById("flash");
const tap=document.getElementById("tap");
const pause=document.getElementById("pause");

function fmt(sec){
 const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=Math.floor(sec%60),hs=Math.floor((sec%1)*100);
 const p=n=>String(n).padStart(2,"0");
 return h?`${p(h)}:${p(m)}:${p(s)}.${p(hs)}`:`${p(m)}:${p(s)}.${p(hs)}`;
}
function loop(now){
 if(running){
   elapsed=(now-start-pausedMs)/1000;
   timeEl.textContent=fmt(elapsed);
 }
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function border(bpm){
 if(bpm<12) return "#0A84FF";
 if(bpm<=20) return "#30D158";
 if(bpm<=29) return "#FF9F0A";
 return "#FF453A";
}
function calc(){
 if(inhaleTimes.length<2){
   rrEl.textContent="--";
   return;
 }
 const duration=(inhaleTimes[inhaleTimes.length-1]-inhaleTimes[0])/1000;
 const intervals=inhaleTimes.length-1;
 const bpm=(intervals*60)/duration;
 rrEl.textContent=Math.round(bpm);
 card.style.borderColor=border(bpm);
}
function blink(){
 flash.style.background="#30D158";
 flash.style.opacity=.12;
 setTimeout(()=>flash.style.opacity=0,120);
}
tap.onclick=()=>{
 const now=performance.now();
 if(now-lastTap<250)return;
 lastTap=now;
 if(!started){
   started=true;
   running=true;
   start=now;
 }
 if(navigator.vibrate) navigator.vibrate(10);
 blink();
 inhaleTimes.push(now);
 inhalesEl.textContent=inhaleTimes.length;
 calc();
};
pause.onclick=()=>{
 if(!started)return;
 if(running){
   running=false;
   paused=true;
   pauseAt=performance.now();
   pause.textContent="Resume";
 }else if(paused){
   pausedMs+=performance.now()-pauseAt;
   running=true;
   paused=false;
   pause.textContent="Pause";
 }
};
clear.onclick=()=>{
 started=false;running=false;paused=false;
 start=0;pauseAt=0;pausedMs=0;elapsed=0;
 inhaleTimes=[];lastTap=0;
 timeEl.textContent="00:00.00";
 inhalesEl.textContent="0";
 rrEl.textContent="--";
 pause.textContent="Pause";
 card.style.borderColor="#30D158";
};
</script>
</body>
</html>
