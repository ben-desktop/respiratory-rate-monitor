<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Res-Rate 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:18px}
#app{width:min(430px,100%);display:flex;flex-direction:column;gap:16px}
#credit{text-align:center;color:#7b7b7b;font-size:13px;font-weight:500;letter-spacing:.5px;user-select:none}
.card{background:#111;border:4px solid #30D158;border-radius:24px;transition:border-color .25s ease}
#rrCard{padding:26px;text-align:center}
#rrValue{font-size:88px;font-weight:700;line-height:.95;font-variant-numeric:tabular-nums}
#rrUnit{margin-top:10px;color:#aaa;font-size:28px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.small{background:#111;border-radius:20px;padding:18px}
.label{text-align:center;color:#888;font-size:14px;margin-bottom:10px}
.stopWrap{display:grid;grid-template-columns:1fr auto;align-items:center}
.stopDigits{width:9ch;text-align:center;justify-self:center;font-size:30px;font-weight:600;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.stopUnit{font-size:12px;color:#777;justify-self:end}
.count{text-align:center;font-size:30px;font-weight:600;font-variant-numeric:tabular-nums}
button{border:none;border-radius:22px;font-weight:700;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
#tap{padding:22px;background:#0A84FF;color:#fff;font-size:23px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row button{padding:18px;background:#222;color:#fff;font-size:20px}
#flash{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity .12s}
</style>
</head>
<body>
<div id="flash"></div>
<div id="app">
<div id="credit">Ritti.co | Res-Rate 2026</div>
<div id="rrCard" class="card"><div id="rrValue">--</div><div id="rrUnit">BPM</div></div>
<div class="stats">
<div class="small"><div class="label">Stopwatch</div><div class="stopWrap"><div id="time" class="stopDigits">00:00.00</div><div class="stopUnit">elapsed</div></div></div>
<div class="small"><div class="label">Inhales</div><div id="inhales" class="count">0</div></div>
</div>
<button id="tap">TAP TO RECORD INHALE</button>
<div class="row"><button id="pause">Pause</button><button id="clear">Clear</button></div>
</div>
<script>
const timeEl=time,rrEl=rrValue,card=rrCard,inhalesEl=inhales,flash=document.getElementById("flash"),tap=document.getElementById("tap"),pause=document.getElementById("pause");
let started=false,running=false,paused=false,start=0,pauseAt=0,pausedMs=0,elapsed=0,inhaleTimes=[],lastTap=0;
function fmt(sec){const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=Math.floor(sec%60),hs=Math.floor((sec%1)*100),p=n=>String(n).padStart(2,"0");return h?`${p(h)}:${p(m)}:${p(s)}.${p(hs)}`:`${p(m)}:${p(s)}.${p(hs)}`;}
(function loop(now){if(running){elapsed=(now-start-pausedMs)/1000;timeEl.textContent=fmt(elapsed);}requestAnimationFrame(loop);})(performance.now());
const border=b=>b<12?"#0A84FF":b<=20?"#30D158":b<=29?"#FF9F0A":"#FF453A";
function calc(){if(inhaleTimes.length<2){rrEl.textContent="--";card.style.borderColor="#30D158";return;}const dur=(inhaleTimes.at(-1)-inhaleTimes[0])/1000;const bpm=((inhaleTimes.length-1)*60)/dur;rrEl.textContent=Math.round(bpm);card.style.borderColor=border(bpm);}
function blink(){flash.style.background="#30D158";flash.style.opacity=.12;setTimeout(()=>flash.style.opacity=0,120);}
tap.onclick=()=>{const now=performance.now();if(now-lastTap<250)return;lastTap=now;if(!started){started=true;running=true;start=now;}navigator.vibrate?.(10);blink();inhaleTimes.push(now);inhalesEl.textContent=inhaleTimes.length;calc();};
pause.onclick=()=>{if(!started)return;if(running){running=false;paused=true;pauseAt=performance.now();pause.textContent="Resume";}else if(paused){pausedMs+=performance.now()-pauseAt;running=true;paused=false;pause.textContent="Pause";}};
clear.onclick=()=>{started=running=paused=false;start=pauseAt=pausedMs=elapsed=0;inhaleTimes=[];lastTap=0;timeEl.textContent="00:00.00";inhalesEl.textContent="0";rrEl.textContent="--";pause.textContent="Pause";card.style.borderColor="#30D158";};
["gesturestart","gesturechange","gestureend"].forEach(e=>document.addEventListener(e,x=>x.preventDefault()));
let lastTouchEnd=0;
document.addEventListener("touchend",e=>{const now=Date.now();if(now-lastTouchEnd<=300)e.preventDefault();lastTouchEnd=now;},{passive:false});
</script>
</body>
</html>
