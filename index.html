<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Respiratory Rate Monitor</title>
<style>
:root{--bg:#000;--fg:#fff;--card:#f7f7f7;--text:#111;--g:#2ecc71;--b:#3b82f6;--r:#d32f2f}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;color:#fff}
body{transition:background-color .12s ease}
.flashG{background:#12361f}.flashB{background:#102b45}
#app{height:100%;display:flex;flex-direction:column;padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom))}
.top{text-align:center;color:#9aa0a6;font-size:13px}
.card{background:var(--card);color:var(--text);border-radius:28px;padding:20px;text-align:center;margin:14px 0;transition:transform .1s}
.card.hit{transform:scale(1.02)}
.rate{font-size:min(24vw,120px);font-weight:800;line-height:.95}
.unit{font-size:22px}
.sec{text-align:center;margin:8px 0}
.lab{color:#9aa0a6;font-size:18px}
.val{font-size:34px;font-weight:700}
.phase{font-size:34px;font-weight:700;transition:opacity .15s}
.status{font-size:22px;font-weight:700}
.bottom{margin-top:auto}
button{border:none;border-radius:20px;padding:16px;font-size:22px;font-weight:700;color:#fff;background:#222;width:100%}
.row{display:flex;gap:10px}
#clear{background:var(--r)}
.hide{display:none}
</style></head>
<body>
<div id="app">
<div class="top">Ritti.co – Res-Rate 2026</div>
<div class="card" id="card"><div class="rate" id="rate">—</div><div class="unit">breaths/min</div></div>
<div class="sec"><div class="status" id="status">⚪ Ready</div></div>
<div class="sec"><div class="lab">Elapsed</div><div class="val" id="elapsed">00:00.0</div></div>
<div class="sec"><div class="lab">Completed Breaths</div><div class="val" id="breaths">0</div></div>
<div class="sec"><div class="lab">Current Phase</div><div class="phase" id="phase">Tap START</div></div>
<div class="bottom">
<button id="start">🟢🔵 START</button>
<div class="row hide" id="controls">
<button id="pause">⏸ Pause</button>
<button id="clear">🗑 Clear</button>
</div>
</div></div>
<script>
let running=false,paused=false,start=0,pauseAt=0,pauseTotal=0,breaths=0,phase="INHALE",lastTap=0,wake=null,tick;
const $=id=>document.getElementById(id);
async function lock(on){if(!("wakeLock"in navigator))return;try{if(on)wake=await navigator.wakeLock.request("screen");else if(wake){await wake.release();wake=null}}catch{}}
function vibrate(){navigator.vibrate&&navigator.vibrate(10)}
function ms(){return performance.now()-start-pauseTotal}
function fmt(t){let s=t/1000,m=Math.floor(s/60);s=(s%60).toFixed(1).padStart(4,"0");return String(m).padStart(2,"0")+":"+s}
function update(){if(running&&!paused)$("elapsed").textContent=fmt(ms())}
function bpm(){if(!breaths){$("rate").textContent="—";return}let r=breaths*60/(ms()/1000);$("rate").textContent=r.toFixed(1)}
function pulse(){let c=$("card");c.classList.add("hit");setTimeout(()=>c.classList.remove("hit"),90)}
function flash(c){document.body.classList.add(c);setTimeout(()=>document.body.classList.remove(c),120)}
$("start").onclick=()=>{vibrate();if(!running){running=true;paused=false;start=performance.now();tick=setInterval(update,100);$("status").textContent="🟢 Recording";$("phase").textContent="🟢 INHALE";$("start").classList.add("hide");$("controls").classList.remove("hide");lock(true);return}
if(paused){paused=false;pauseTotal+=performance.now()-pauseAt;$("status").textContent="🟢 Recording";$("pause").textContent="⏸ Pause";$("start").classList.add("hide")}}
$("pause").onclick=()=>{vibrate();paused=!paused;if(paused){pauseAt=performance.now();$("status").textContent="⏸ Paused";$("pause").textContent="▶ Resume"}else{$("start").onclick()}}
$("clear").onclick=()=>{vibrate();clearInterval(tick);running=false;paused=false;pauseTotal=0;breaths=0;$("rate").textContent="—";$("elapsed").textContent="00:00.0";$("breaths").textContent="0";$("phase").textContent="Tap START";$("status").textContent="⚪ Ready";$("controls").classList.add("hide");$("start").classList.remove("hide");lock(false)}
document.body.onpointerdown=e=>{
if(e.target.tagName==="BUTTON"||!running||paused)return;
let n=performance.now();if(n-lastTap<250)return;lastTap=n;vibrate();pulse();
if(phase==="INHALE"){phase="EXHALE";$("phase").textContent="🔵 EXHALE";flash("flashB")}
else{phase="INHALE";breaths++;$("breaths").textContent=breaths;bpm();$("phase").textContent="🟢 INHALE";flash("flashG")}
}
</script></body></html>
