<!DOCTYPE html>
<html lang="en">
<head>

    <!-- ==========================================================
         Respiratory Rate Monitor
         Ritti.co • Res-Rate
         Part 1/2
         ========================================================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">

    <meta
        name="theme-color"
        content="#0A0A0A">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent">

    <meta
        name="apple-mobile-web-app-title"
        content="Res-Rate">

    <title>Respiratory Rate Monitor</title>

    <link rel="manifest" href="manifest.json">

    <link
        rel="apple-touch-icon"
        href="icons/apple-touch-icon.png">

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

<div id="app">

    <!-- ======================================================
         Header
         ====================================================== -->

    <header id="header">

        <div id="brand">

            Ritti.co

            <span>•</span>

            Res-Rate

        </div>

        <div id="statusPill" class="status ready">

            <span class="status-dot"></span>

            <span id="statusText">

                Ready

            </span>

        </div>

    </header>



    <!-- ======================================================
         Main Content
         ====================================================== -->

    <main>

        <!-- ===============================================
             Respiratory Rate Card
             =============================================== -->

        <section
            id="rateCard"
            class="card hero">

            <h2>

                Respiratory Rate

            </h2>

            <div id="rateValue">

                —

            </div>

            <div id="rateUnits">

                breaths / min

            </div>

        </section>



        <!-- ===============================================
             Information Grid
             =============================================== -->

        <section id="infoGrid">

            <article class="card small">

                <h3>

                    Elapsed

                </h3>

                <div
                    id="elapsedTime"
                    class="metric">

                    00:00.0

                </div>

            </article>



            <article class="card small">

                <h3>

                    Breaths

                </h3>

                <div
                    id="completedBreaths"
                    class="metric">

                    0

                </div>

            </article>

        </section>



        <!-- ===============================================
             Last Recorded
             =============================================== -->

        <section
            id="lastRecordedCard"
            class="card">

            <h3>

                Last Recorded

            </h3>

            <div id="lastRecorded">

                Ready to Start

            </div>

        </section>



        <!-- ===============================================
             Next Action
             =============================================== -->

        <section
            id="nextActionCard"
            class="card action">

            <button
                id="actionButton"
                type="button">

                <span
                    id="actionEmoji">

                    🟢

                </span>

                <span
                    id="actionTitle">

                    TAP TO RECORD

                </span>

                <span
                    id="actionPhase">

                    INHALE

                </span>

            </button>

        </section>



        <!-- ===============================================
             Confidence
             =============================================== -->

        <section
            id="confidenceCard"
            class="card">

            <div class="row">

                <span>

                    Confidence

                </span>

                <span
                    id="confidenceText">

                    Waiting...

                </span>

            </div>

            <div
                id="confidenceBar">

                <div
                    id="confidenceFill">

                </div>

            </div>

        </section>



        <!-- ===============================================
             Controls
             =============================================== -->

        <section
            id="controls">

            <button
                id="pauseButton"
                class="secondary">

                ⏸

                <span>

                    Pause

                </span>

            </button>

            <button
                id="clearButton"
                class="danger">

                🗑

                <span>

                    Clear

                </span>

            </button>

        </section>

    </main>



    <!-- ===============================================
         Background Flash Overlay
         =============================================== -->

    <div id="flashOverlay"></div>

</div>



<!-- ===============================================
     Application Script
     =============================================== -->

<script
    src="js/app.js"
    defer>

</script>

</body>
</html>
