<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Res-Rate 2026 · v2</title>

<style>

/* ======================================================
   GLOBAL
====================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
-webkit-touch-callout:none;
-webkit-user-select:none;
user-select:none;
}

html,body{
height:100%;
background:#000;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;
color:#fff;
touch-action:manipulation;
}

body{
display:flex;
justify-content:center;
align-items:center;
padding:18px;
}

/* ======================================================
   COLOURS
====================================================== */

:root{

--bg:#000;
--card:#111;

--text:#fff;
--secondary:#8e8e93;
--border:#30D158;

--blue:#0A84FF;
--green:#30D158;
--orange:#FF9F0A;
--red:#FF453A;

}

/* ======================================================
   LAYOUT
====================================================== */

#app{
width:min(430px,100%);
display:flex;
flex-direction:column;
gap:16px;
}

#credit{
text-align:center;
font-size:13px;
font-weight:500;
letter-spacing:.4px;
color:#6e6e73;
pointer-events:none;
}

.card{
background:var(--card);
border:4px solid var(--border);
border-radius:24px;
padding:26px;
transition:border-color .25s ease;
}

#dateTime{
text-align:center;
color:var(--secondary);
font-size:14px;
font-variant-numeric:tabular-nums;
margin-bottom:12px;
}
#rrRow{
display:flex;
justify-content:center;
align-items:flex-start;
gap:10px;
}

#rrValue{
font-size:90px;
font-weight:700;
line-height:.9;
font-variant-numeric:tabular-nums;
}

#trend{
margin-top:16px;
font-size:24px;
color:var(--secondary);
transition:opacity .2s ease,transform .2s ease;
}

#unit{
margin-top:8px;
font-size:24px;
font-weight:500;
color:var(--secondary);
text-align:center;
text-transform:none;
}

#status{
margin-top:18px;
text-align:center;
font-size:18px;
font-weight:700;
transition:color .25s ease;
}

#previous{
margin-top:8px;
text-align:center;
font-size:14px;
color:var(--secondary);
opacity:.9;
transform:translateY(0);
transition:
opacity .25s ease,
transform .25s ease;
}

/* ======================================================
   LOWER CARDS
====================================================== */

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.small{
background:var(--card);
border-radius:20px;
padding:18px;
}

.label{
text-align:center;
font-size:14px;
color:var(--secondary);
margin-bottom:10px;
}

.value{
text-align:center;
font-size:30px;
font-weight:600;
font-variant-numeric:tabular-nums;
}

/* ======================================================
   BUTTONS
====================================================== */

button{
border:none;
border-radius:22px;
font-size:22px;
font-weight:700;
cursor:pointer;
touch-action:manipulation;
transition:
background-color .18s ease,
transform .10s ease;
}

button:active{
transform:scale(.98);
}

#tapButton{
padding:22px;
background:#0A84FF;
color:#fff;
animation:pulse 2.4s ease-in-out infinite;
}

#tapButton.flash{
background:#30D158;
animation:none;
}

#resetButton{
padding:18px;
background:#222;
color:#fff;
}

#resetButton:active{
background:#333;
}

/* ======================================================
   ANIMATIONS
====================================================== */

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.02);
}

100%{
transform:scale(1);
}

}

</style>

</head>

<body>

<div id="app">

<div id="credit">
Ritti.co | Res-Rate 2026 · v2.1
</div>

<div id="rrCard" class="card">

<div id="dateTime"></div>

<div id="rrRow">

<div id="rrValue">--</div>

<div id="trend">→</div>

</div>

<div id="unit">rpm</div>

<div id="status">READY</div>

<div id="previous">Previous: --</div>

</div>

<div class="stats">

<div class="small">

<div class="label">
Measurement Time
</div>

<div id="stopwatch" class="value">
00:00.00
</div>

</div>

<div class="small">

<div class="label">
Inhales
</div>

<div id="inhaleCount" class="value">
0
</div>

</div>

</div>

<button id="tapButton">
TAP EACH INHALE
</button>

<button id="resetButton">
RESET
</button>

</div>

<script>

/* ======================================================
   CONFIGURATION
====================================================== */

const CONFIG={

ROLLING_INTERVALS:8,

DOUBLE_TAP_MS:250,

BUTTON_FLASH_MS:180,

STATUS:{

LOW:12,
NORMAL:20,
ELEVATED:29

}

};

/* ======================================================
   DOM REFERENCES
====================================================== */

const rrCard=document.getElementById("rrCard");

const rrValue=document.getElementById("rrValue");

const trend=document.getElementById("trend");

const unit=document.getElementById("unit");

const status=document.getElementById("status");

const previous=document.getElementById("previous");

const stopwatch=document.getElementById("stopwatch");

const inhaleCount=document.getElementById("inhaleCount");

const tapButton=document.getElementById("tapButton");

const resetButton=document.getElementById("resetButton");

const dateTime=document.getElementById("dateTime");
/* ======================================================
   STATE
====================================================== */

let measurementStarted = false;
let measurementStart = 0;

let lastTapTime = 0;

let inhaleTimestamps = [];

let previousRR = null;
let currentRR = null;

/* ======================================================
   UTILITIES
====================================================== */

function formatStopwatch(ms){

const totalSeconds = ms / 1000;

const minutes = Math.floor(totalSeconds / 60);

const seconds = Math.floor(totalSeconds % 60);

const hundredths = Math.floor((totalSeconds % 1) * 100);

return (
String(minutes).padStart(2,"0") +
":" +
String(seconds).padStart(2,"0") +
"." +
String(hundredths).padStart(2,"0")
);

}

function updateDateTime(){

const now = new Date();

dateTime.textContent = now.toLocaleString([],{

year:"numeric",
month:"short",
day:"numeric",
hour:"2-digit",
minute:"2-digit",
second:"2-digit"

});

}

function getStatus(rr){

if(rr < CONFIG.STATUS.LOW){

return{
label:"LOW",
colour:"#0A84FF"
};

}

if(rr <= CONFIG.STATUS.NORMAL){

return{
label:"NORMAL",
colour:"#30D158"
};

}

if(rr <= CONFIG.STATUS.ELEVATED){

return{
label:"ELEVATED",
colour:"#FF9F0A"
};

}

return{

label:"CRITICAL",
colour:"#FF453A"

};

}

/* ======================================================
   RESPIRATORY RATE ENGINE
====================================================== */

function calculateRR(){

if(inhaleTimestamps.length < 2){

rrValue.textContent="--";
trend.textContent="→";

status.textContent="READY";
status.style.color="#ffffff";

previous.textContent="Previous: --";

rrCard.style.borderColor="#30D158";

currentRR=null;

return;

}

const intervals=[];

for(let i=1;i<inhaleTimestamps.length;i++){

intervals.push(

inhaleTimestamps[i]-inhaleTimestamps[i-1]

);

}

const rolling = intervals.slice(

-CONFIG.ROLLING_INTERVALS

);

const averageInterval =

rolling.reduce(

(a,b)=>a+b,

0

)/rolling.length;

const rr = Math.round(

60000/averageInterval

);

if(currentRR!==null){

previousRR=currentRR;

}

currentRR=rr;

rrValue.textContent=rr;

if(previousRR===null){

trend.textContent="→";

}else if(rr>previousRR){

trend.textContent="↑";

}else if(rr<previousRR){

trend.textContent="↓";

}else{

trend.textContent="→";

}

if(previousRR!==null){

previous.style.opacity="0";

previous.style.transform="translateY(6px)";

setTimeout(()=>{

previous.textContent="Previous: "+previousRR;

previous.style.opacity="0.9";

previous.style.transform="translateY(0)";

},120);

}

const state=getStatus(rr);

status.textContent=state.label;

status.style.color=state.colour;

rrCard.style.borderColor=state.colour;

}

/* ======================================================
   STOPWATCH
====================================================== */

function animationLoop(now){

updateDateTime();

if(measurementStarted){

stopwatch.textContent=

formatStopwatch(

now-measurementStart

);

}

requestAnimationFrame(animationLoop);

}

requestAnimationFrame(animationLoop);
/* ======================================================
   EVENT HANDLERS
====================================================== */

function flashTapButton(){

tapButton.classList.add("flash");

navigator.vibrate?.(10);

setTimeout(()=>{

tapButton.classList.remove("flash");

},CONFIG.BUTTON_FLASH_MS);

}

tapButton.addEventListener("click",()=>{

const now=performance.now();

/* Prevent accidental double taps */

if(now-lastTapTime<CONFIG.DOUBLE_TAP_MS){

return;

}

lastTapTime=now;

/* First inhale starts measurement */

if(!measurementStarted){

measurementStarted=true;

measurementStart=now;

}

/* Visual feedback */

flashTapButton();

/* Record inhale */

inhaleTimestamps.push(now);

inhaleCount.textContent=inhaleTimestamps.length;

/* Update RR */

calculateRR();

});

/* ======================================================
   RESET
====================================================== */

resetButton.addEventListener("click",()=>{

measurementStarted=false;

measurementStart=0;

lastTapTime=0;

inhaleTimestamps=[];

previousRR=null;

currentRR=null;

/* Reset UI */

rrValue.textContent="--";

trend.textContent="→";

status.textContent="READY";

status.style.color="#ffffff";

previous.textContent="Previous: --";

rrCard.style.borderColor="#30D158";

stopwatch.textContent="00:00.00";

inhaleCount.textContent="0";

});

/* ======================================================
   ACCESSIBILITY
====================================================== */

["gesturestart","gesturechange","gestureend"].forEach(eventName=>{

document.addEventListener(eventName,event=>{

event.preventDefault();

});

});

let lastTouchEnd=0;

document.addEventListener("touchend",event=>{

const now=Date.now();

if(now-lastTouchEnd<=300){

event.preventDefault();

}

lastTouchEnd=now;

},{passive:false});

/* ======================================================
   INITIALISATION
====================================================== */

updateDateTime();

status.textContent="READY";

trend.textContent="→";

unit.textContent="rpm";

rrCard.style.borderColor="#30D158";

</script>

</body>
</html>
