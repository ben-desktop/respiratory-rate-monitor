<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Respiratory Rate Monitor</title>
<style>
:root{--bg:#000;--fg:#fff;--card:#fafafa;--txt:#111;--mut:#9aa0a6;--g:#2ecc71;--b:#4da3ff;--o:#ff9800;--r:#e53935}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif}
body{transition:background .12s}
.g{background:#14381f}.bl{background:#102b45}
#app{height:100%;display:flex;flex-direction:column;padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom))}
.h{text-align:center;color:var(--mut);font-size:13px}
.card{margin:12px 0;background:var(--card);color:#111;border-radius:28px;padding:18px;text-align:center;border:5px solid #fff;transition:transform .08s,border-color .2s}
.card.hit{transform:scale(1.02)}
.small{font-size:14px;color:#666}
#rate{font-size:min(24vw,120px);font-weight:800;line-height:.9}
.sec{text-align:center;margin:8px 0}
.lab{color:var(--mut);font-size:17px}
.val{font-size:34px;font-weight:700}
#phase{font-size:30px;font-weight:700}
#status{font-size:22px;font-weight:700}
#next{margin:14px 0;padding:18px;border-radius:22px;background:#171717;border:2px solid #333;text-align:center;font-size:28px;font-weight:700}
#next small{display:block;color:#bbb;font-size:15px;font-weight:400;margin-top:8px}
.conf{height:8px;background:#222;border-radius:99px;overflow:hidden;margin:8px auto;width:75%}
#bar{height:100%;width:0;background:var(--g);transition:width .2s}
.controls{margin-top:auto;display:flex;gap:10px}
button{flex:1;border:none;border-radius:18px;padding:15px;font-size:22px;font-weight:700;color:#fff;background:#222}
#clear{background:var(--r)}
</style></head><body>
<div id="app">
<div class="h">Ritti.co – Res-Rate 2026</div>
<div id="card" class="card"><div class="small">Respiratory Rate<br>อัตราการหายใจ</div><div id="rate">—</div><div class="small">breaths/min · ครั้ง/นาที</div></div>
<div class="sec"><div id="status">⚪ Ready<br><span class="small">พร้อมเริ่ม</span></div></div>
<div class="sec"><div class="lab">Elapsed<br><span class="small">เวลาที่ผ่านไป</span></div><div id="elapsed" class="val">00:00.0</div></div>
<div class="sec"><div class="lab">Completed Breaths<br><span class="small">รอบการหายใจ</span></div><div id="breaths" class="val">0</div></div>
<div class="sec"><div class="lab">Current Phase<br><span class="small">ระยะปัจจุบัน</span></div><div id="phase">Ready to Start</div></div>
<div id="next">🟢 TAP TO RECORD INHALE<small>Tap when breathing in begins<br>แตะเมื่อเริ่มหายใจเข้า</small></div>
<div class="sec"><div class="lab">Confidence</div><div class="conf"><div id="bar"></div></div><div id="conf">Waiting…</div></div>
<div class="controls">
<button id="pause">⏸ Pause</button>
<button id="clear">🗑 Clear</button>
</div>
</div>
<script>
let started=false,paused=false,start=0,pauseAt=0,pauseSum=0,last=0,phase="INHALE",breaths=0,t;
const $=i=>document.getElementById(i);
async function wl(x){if(!("wakeLock"in navigator))return;try{if(x)window.w=await navigator.wakeLock.request("screen");else if(window.w){await window.w.release();window.w=null}}catch{}}
const vib=()=>navigator.vibrate&&navigator.vibrate(10);
const ms=()=>performance.now()-start-pauseSum;
const fmt=m=>{let s=m/1000,M=Math.floor(s/60);s=(s%60).toFixed(1).padStart(4,"0");return String(M).padStart(2,"0")+":"+s}
setInterval(()=>{if(started&&!paused)$("elapsed").textContent=fmt(ms())},100);
function pulse(){card.classList.add("hit");setTimeout(()=>card.classList.remove("hit"),90)}
function flash(c){document.body.classList.add(c);setTimeout(()=>document.body.classList.remove(c),120)}
function bpmColor(v){let c="#fff";if(v<12)c="var(--b)";else if(v<=20)c="#fff";else if(v<30)c="var(--o)";else c="var(--r)";card.style.borderColor=c}
function update(){if(!breaths){rate.textContent="—";return}let b=breaths*60/(ms()/1000);rate.textContent=b.toFixed(1);bpmColor(b)}
function confidence(){let w=Math.min(100,breaths/6*100);bar.style.width=w+"%";conf.textContent=breaths<1?"Waiting…":breaths<3?"Low":breaths<6?"Moderate":"High"}
next.onclick=()=>{
if(paused)return;
let n=performance.now();if(n-last<250)return;last=n;vib();pulse();
if(!started){started=true;start=n;status.innerHTML="🟢 Recording<br><span class='small'>กำลังบันทึก</span>";wl(true)}
if(phase==="INHALE"){
phase="EXHALE";
phaseEl="🟢 INHALE";
$("phase").textContent=phaseEl;
next.innerHTML="🔵 TAP TO RECORD EXHALE<small>Tap when breathing out begins<br>แตะเมื่อเริ่มหายใจออก</small>";
flash("g");
}else{
phase="INHALE";
breaths++;breathsEl.textContent=breaths;update();confidence();
$("phase").textContent="🔵 EXHALE";
next.innerHTML="🟢 TAP TO RECORD INHALE<small>Tap when breathing in begins<br>แตะเมื่อเริ่มหายใจเข้า</small>";
flash("bl");
}
}
pause.onclick=()=>{
if(!started)return;vib();
paused=!paused;
if(paused){pauseAt=performance.now();status.innerHTML="⏸ Paused<br><span class='small'>หยุดชั่วคราว</span>";pause.textContent="▶ Resume"}
else{pauseSum+=performance.now()-pauseAt;status.innerHTML="🟢 Recording<br><span class='small'>กำลังบันทึก</span>";pause.textContent="⏸ Pause"}
}
clear.onclick=async()=>{
vib();started=false;paused=false;pause.textContent="⏸ Pause";pauseSum=0;breaths=0;phase="INHALE";
rate.textContent="—";elapsed.textContent="00:00.0";breathsEl.textContent="0";phase.textContent="Ready to Start";
status.innerHTML="⚪ Ready<br><span class='small'>พร้อมเริ่ม</span>";
next.innerHTML="🟢 TAP TO RECORD INHALE<small>Tap when breathing in begins<br>แตะเมื่อเริ่มหายใจเข้า</small>";
bar.style.width="0";conf.textContent="Waiting…";card.style.borderColor="#fff";await wl(false)}
const breathsEl=$("breaths"),card=$("card"),rate=$("rate"),elapsed=$("elapsed"),status=$("status"),next=$("next"),bar=$("bar"),conf=$("conf"),pause=$("pause"),clear=$("clear");
</script>
</body></html>
